<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBM LeadTool — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #090c18; --surface: #0e1525; --surface2: #141d35;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --blue: #2563eb; --blue-hover: #1d4ed8; --blue-dim: rgba(37,99,235,0.12); --blue-border: rgba(37,99,235,0.4);
    --text: #e8eaf0; --muted: #8890a8;
    --danger: #ef4444; --danger-dim: rgba(239,68,68,0.12);
    --font-head: 'Rajdhani', sans-serif; --font-body: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 380px; padding: 40px 36px; }
  .logo { font-family: var(--font-head); font-size: 26px; font-weight: 700; letter-spacing: 2px; color: var(--blue); display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo-icon { width: 34px; height: 34px; background: var(--blue); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 18px; height: 18px; fill: #fff; }
  .tagline { font-size: 13px; color: var(--muted); margin-bottom: 36px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.3px; }
  input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 15px; padding: 12px 14px; width: 100%; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .btn-login { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-family: var(--font-head); font-size: 16px; font-weight: 700; letter-spacing: 1px; padding: 13px; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
  .btn-login:hover { background: var(--blue-hover); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg { background: var(--danger-dim); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 14px; display: none; }
  .error-msg.show { display: block; }
  .divider { height: 1px; background: var(--border); margin: 28px 0 20px; }
  .footer-note { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 20 20"><path d="M9 12l-4-4m0 0l4-4m-4 4h12M5 19H3a2 2 0 01-2-2V3a2 2 0 012-2h2"/><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-.293.707L13 10.414V17a1 1 0 01-1.447.894l-4-2A1 1 0 017 15V10.414L3.293 6.707A1 1 0 013 6V4z"/></svg></div>
    MBM LeadTool
  </div>
  <p class="tagline">Sign in to continue</p>

  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@mbm.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn-login" id="loginBtn" onclick="login()">Sign In</button>
  <div class="error-msg" id="errorMsg"></div>

  <div class="divider"></div>
  <p class="footer-note">Contact your administrator if you need access.</p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBhgeKTEsSMQyXEKGvZ2iMO8yfXTHpLhZo",
    authDomain: "comptrack-d9cff.firebaseapp.com",
    projectId: "comptrack-d9cff",
    storageBucket: "comptrack-d9cff.firebasestorage.app",
    messagingSenderId: "419068288887",
    appId: "1:419068288887:web:191e2b7388a1007caccb72",
    measurementId: "G-L1Z1PNMPJ1"
  };
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

auth.onAuthStateChanged(async user => {
  if (!user) return;
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (!doc.exists || doc.data().isActive === false) { await auth.signOut(); return; }
    redirect(doc.data().role);
  } catch(e) { console.error(e); }
});

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('errorMsg');
  err.classList.remove('show');
  if (!email || !pass) { showErr('Please enter your email and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const doc  = await db.collection('users').doc(cred.user.uid).get();
    if (!doc.exists) { await auth.signOut(); showErr('Account not set up. Contact your administrator.'); return; }
    if (doc.data().isActive === false) { await auth.signOut(); showErr('Your account has been deactivated. Contact your administrator.'); return; }
    redirect(doc.data().role);
  } catch(e) {
    const msgs = { 'auth/user-not-found': 'No account found with that email.', 'auth/wrong-password': 'Incorrect password.', 'auth/invalid-email': 'Invalid email address.', 'auth/too-many-requests': 'Too many attempts. Try again later.' };
    showErr(msgs[e.code] || 'Sign in failed. Please try again.');
  } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
}

function redirect(role) {
  if (role === 'admin') window.location.href = 'admin.html';
  else if (role === 'sales') window.location.href = 'dashboard.html';
  else window.location.href = 'index.html';
}

function showErr(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Sign In';
}
</script>
</body>
</html>
